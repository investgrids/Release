[build]
builder = "DOCKERFILE"

# No [deploy].startCommand here on purpose: it would silently override the
# Dockerfile's CMD (gunicorn, with worker timeout/recycling/graceful-shutdown
# tuning). Bare `uvicorn --workers 1` has no process supervisor -- if the
# single event loop ever hard-crashes, nothing restarts it except Railway's
# limited container-level retries below.

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
